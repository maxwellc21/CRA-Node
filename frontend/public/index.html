<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Review App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">ReviewHub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="#products">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#profile-section">Profile</a></li>
          <li class="nav-item"><button id="openLoginBtn" class="btn btn-outline-light btn-sm me-2">Login</button></li>
          <li class="nav-item"><button id="openRegisterBtn" class="btn btn-warning btn-sm me-2">Register</button></li>
          <li class="nav-item"><button id="logoutBtn" class="btn btn-danger btn-sm d-none">Logout</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="hero py-5">
    <div class="container text-center">
      <h1 class="display-5 fw-bold">Customer Review App</h1>
      <p class="lead">Browse products and services, then post and manage your reviews.</p>
      <button class="btn btn-light btn-lg" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">Explore Reviews</button>
    </div>
  </header>

  <main class="container my-5">
    <div id="alertBox"></div>

    <section id="products">
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h2 class="mb-0">Trending Products & Services</h2>
        <button id="seedBtn" class="btn btn-primary btn-sm">Seed Demo Products</button>
      </div>
      <div id="productList" class="row g-4"></div>
    </section>

    <section id="productDetailsSection" class="mt-5 d-none">
      <div id="productDetails"></div>
      <div class="card shadow-sm mt-4">
        <div class="card-body">
          <h4 class="mb-3">Reviews</h4>
          <div id="reviewList"></div>
        </div>
      </div>

      <div class="card shadow-sm mt-4">
        <div class="card-body">
          <h4 class="mb-3">Write a Review</h4>
          <form id="reviewForm">
            <div class="row g-3">
              <div class="col-md-2">
                <label class="form-label">Rating</label>
                <select id="rating" class="form-select" required>
                  <option value="">Select</option>
                  <option>1</option>
                  <option>2</option>
                  <option>3</option>
                  <option>4</option>
                  <option>5</option>
                </select>
              </div>
              <div class="col-md-10">
                <label class="form-label">Review title</label>
                <input type="text" id="reviewTitle" class="form-control" required>
              </div>
              <div class="col-12">
                <label class="form-label">Comment</label>
                <textarea id="reviewComment" class="form-control" rows="4" required></textarea>
              </div>
            </div>
            <button class="btn btn-success mt-3" type="submit">Submit Review</button>
          </form>
        </div>
      </div>
    </section>

    <section id="profile-section" class="mt-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="mb-3">My Profile</h2>
          <div id="profileContent"><p class="text-muted mb-0">Log in to view your profile.</p></div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="authModalTitle">Login</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="authForm"></form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
